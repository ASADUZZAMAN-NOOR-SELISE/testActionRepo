name: Playwright Scheduled Tests
 
on:
  schedule:
    - cron: '0 18 * * *' # 12:00 AM BD Time
  workflow_dispatch:
 
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
 
jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 60
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
 
      - name: Install dependencies
        run: npm ci
 
      - name: Install Playwright browser
        run: npx playwright install chromium
 
      - name: Clean old Playwright outputs
        shell: cmd
        run: |
          if exist playwright-report rmdir /s /q playwright-report
          if exist test-results rmdir /s /q test-results
 
      - name: Run Playwright tests
        run: npm run test-ci
 
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 3
          if-no-files-found: ignore
 
      # ✅ SUCCESS NOTIFICATION
      - name: Notify Teams (Success)
        if: success()
        uses: skitionek/notify-microsoft-teams@master
        with:
          webhook_url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          raw: |
            {
              "@type": "MessageCard",
              "@context": "http://schema.org/extensions",
              "themeColor": "00C853",
              "title": "✅ Test Suite Passed",
              "text": "All Playwright tests completed successfully.",
              "sections": [
                {
                  "facts": [
                    { "name": "Repository", "value": "${{ github.repository }}" },
                    { "name": "Workflow", "value": "${{ github.workflow }}" },
                    { "name": "Triggered By", "value": "${{ github.actor }}" },
                    { "name": "Trigger Type", "value": "${{ github.event_name }}" },
                    { "name": "Branch", "value": "${{ github.ref_name }}" }
                  ]
                }
              ],
              "potentialAction": [
                {
                  "@type": "OpenUri",
                  "name": "🔍 View Run",
                  "targets": [
                    {
                      "os": "default",
                      "uri": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
 
      # ❌ FAILURE NOTIFICATION (Styled like your image)
      - name: Notify Teams (Failure)
        if: failure()
        uses: skitionek/notify-microsoft-teams@master
        with:
          webhook_url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          raw: |
            {
              "@type": "MessageCard",
              "@context": "http://schema.org/extensions",
              "themeColor": "FF0000",
              "title": "❌ Test Suite Failed — Action Required!",
              "text": "One or more Playwright tests have failed. Please investigate immediately.",
              "sections": [
                {
                  "facts": [
                    { "name": "Repository", "value": "${{ github.repository }}" },
                    { "name": "Workflow", "value": "${{ github.workflow }}" },
                    { "name": "Triggered By", "value": "${{ github.actor }}" },
                    { "name": "Trigger Type", "value": "${{ github.event_name }}" },
                    { "name": "Branch", "value": "${{ github.ref_name }}" }
                  ]
                },
                {
                  "text": "⚠️ Check the uploaded **Playwright Report** artifact for detailed failure logs and screenshots."
                }
              ],
              "potentialAction": [
                {
                  "@type": "OpenUri",
                  "name": "🔍 View Failed Run",
                  "targets": [
                    {
                      "os": "default",
                      "uri": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                },
                {
                  "@type": "OpenUri",
                  "name": "📁 View Repository",
                  "targets": [
                    {
                      "os": "default",
                      "uri": "${{ github.server_url }}/${{ github.repository }}"
                    }
                  ]
                }
              ]
            }
 
 